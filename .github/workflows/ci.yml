name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Mobile tests + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            mobile/package-lock.json
            functions/package-lock.json
      # The parity suites import functions/src TypeScript directly, so the
      # functions dependency tree must exist for module resolution.
      - name: Install functions deps
        working-directory: functions
        run: npm ci
      - name: Install mobile deps
        working-directory: mobile
        run: npm ci
      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit
      - name: Tests (includes client/server parity)
        working-directory: mobile
        run: npx vitest run

  functions:
    name: Functions build (tsc + shared parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - name: Install deps
        working-directory: functions
        run: npm ci
      - name: Build (runs check-shared-parity)
        working-directory: functions
        run: npm run build

  rules:
    name: Firestore rules (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rules-tests/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install deps
        working-directory: rules-tests
        run: npm ci
      - name: Rules tests in the emulator
        working-directory: rules-tests
        run: >
          ./node_modules/.bin/firebase emulators:exec
          --config ../firebase.json
          --project holobots-rules-test
          --only firestore
          "./node_modules/.bin/vitest run"
